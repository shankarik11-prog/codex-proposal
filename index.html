
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Accept Me?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FFF0F3;
    --bg-2: #FFE1E9;
    --card: #FFFFFF;
    --text: #4A0E1D;
    --text-soft: #9A4B5A;
    --accent: #E0115F;
    --accent-2: #FFB100;
    --line: rgba(224,17,95,0.14);
    --shadow: 0 20px 50px rgba(224,17,95,0.22);
    --switch-track: #F4C2CE;
  }
  html[data-theme="dark"]{
    --bg: #1A0510;
    --bg-2: #2A0818;
    --card: #2E0A1D;
    --text: #FFE3EC;
    --text-soft: #D68FA3;
    --accent: #FF1D58;
    --accent-2: #FFD700;
    --line: rgba(255,214,214,0.12);
    --shadow: 0 20px 60px rgba(255,29,88,0.35);
    --switch-track: #4A0E2A;
  }
  *{box-sizing:border-box;}
  html{ perspective: 1400px; }
  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(ellipse at 30% 20%, var(--bg-2), var(--bg) 65%);
    color: var(--text);
    font-family:'Quicksand', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    transition: background .6s ease, color .5s ease;
    overflow-x:hidden;
    position:relative;
  }
  /* ---------- FLOATING 3D/4D HEART FIELD ---------- */
  .heart-field{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
    perspective: 900px;
    transform-style: preserve-3d;
  }
  .heart-particle{
    position:absolute;
    bottom:-60px;
    color: var(--accent);
    opacity:.55;
    will-change: transform;
    animation: rise linear infinite;
    filter: drop-shadow(0 0 6px rgba(224,17,95,0.35));
  }
  @keyframes rise{
    0%{ transform: translate3d(0,0,0) rotateY(0deg) rotateZ(0deg); opacity:0; }
    10%{ opacity:.6; }
    90%{ opacity:.5; }
    100%{ transform: translate3d(var(--drift,20px), -115vh, var(--depth,0px)) rotateY(360deg) rotateZ(20deg); opacity:0; }
  }
  .stage{
    width:100%;
    max-width:460px;
    position:relative;
    z-index:1;
  }
  h1,h2{
    font-family:'Playfair Display', serif;
    margin:0 0 6px;
  }
  /* ---------- GATE (switch entry) ---------- */
  .gate{
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }
  .gate .eyebrow{
    letter-spacing:.16em;
    text-transform:uppercase;
    font-size:12px;
    color: var(--text-soft);
  }
  .gate h1{ font-size:28px; font-style:italic; }
  .gate p{ color:var(--text-soft); margin:0; font-size:14px; }

  /* 3D switch */
  .switch{
    --w: 96px; --h: 52px;
    width:var(--w); height:var(--h);
    perspective: 400px;
    cursor:pointer;
    border:none;
    background:none;
    padding:0;
  }
  .switch-track{
    width:100%; height:100%;
    border-radius:999px;
    background: var(--switch-track);
    position:relative;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.25), 0 6px 14px rgba(0,0,0,0.12);
    transition: background .4s ease;
  }
  .switch-knob{
    position:absolute;
    top:4px; left:4px;
    width:44px; height:44px;
    border-radius:50%;
    background: linear-gradient(145deg, var(--accent-2), var(--accent));
    transform-style: preserve-3d;
    transition: transform .5s cubic-bezier(.34,1.56,.64,1), left .45s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 6px 14px rgba(0,0,0,0.35), inset 0 -3px 4px rgba(0,0,0,0.2);
    display:flex; align-items:center; justify-content:center;
    font-size:20px;
  }
  .switch.on .switch-knob{
    left:48px;
    transform: rotateY(360deg);
  }
  .switch.on .switch-track{
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
  }

  /* rotating 3D heart above the gate title */
  .heart-3d{
    width:64px; height:64px;
    perspective: 300px;
  }
  .heart-3d .face{
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-size:44px;
    animation: spin3d 5s linear infinite;
    transform-style: preserve-3d;
    filter: drop-shadow(0 8px 14px rgba(224,17,95,0.4));
  }
  @keyframes spin3d{
    0%{ transform: rotateY(0deg) rotateX(0deg); }
    50%{ transform: rotateY(180deg) rotateX(10deg); }
    100%{ transform: rotateY(360deg) rotateX(0deg); }
  }

  /* ---------- CARD (shared shell for app steps) — 3D tilt + 4D parallax glow ---------- */
  .card{
    background: var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    padding:36px 30px;
    box-shadow: var(--shadow);
    transform-style: preserve-3d;
    transform: rotateX(var(--tiltY,0deg)) rotateY(var(--tiltX,0deg)) translateZ(0);
    transition: box-shadow .4s ease, background .5s ease, border-color .5s ease, transform .12s ease-out;
    position:relative;
  }
  .card::before{
    content:"";
    position:absolute;
    inset:-1px;
    border-radius:22px;
    padding:1px;
    background: linear-gradient(135deg, var(--accent), transparent 40%, var(--accent-2));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity:.6;
    transform: translateZ(1px);
    pointer-events:none;
  }
  .hidden{ display:none !important; }

  .field{ margin-bottom:16px; text-align:left; }
  .field label{
    display:block;
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color: var(--text-soft);
    margin-bottom:6px;
  }
  .field input, .field textarea{
    width:100%;
    background: transparent;
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:12px 14px;
    font-family:'Quicksand', sans-serif;
    font-size:15px;
    color: var(--text);
    outline:none;
    transition: border-color .2s ease;
    resize: vertical;
  }
  .field input:focus, .field textarea:focus{ border-color: var(--accent); }

  .btn{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:15px;
    padding:13px 22px;
    border-radius:14px;
    border:none;
    cursor:pointer;
    letter-spacing:.02em;
  }
  .btn:focus-visible{ outline:3px solid var(--accent-2); outline-offset:2px; }
  .btn-primary{
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color:#fff;
    box-shadow: 0 10px 22px rgba(232,87,125,0.35);
    transition: transform .15s ease;
  }
  .btn-primary:hover{ transform: translateY(-2px); }
  .btn-ghost{
    background: transparent;
    color: var(--text-soft);
    border:1.5px solid var(--line);
  }
  .btn-block{ width:100%; }

  /* ---------- ASK STEP ---------- */
  .ask{ text-align:center; }
  .ask .heart{ font-size:44px; margin-bottom:6px; }
  .ask h2{ font-size:24px; line-height:1.35; }
  .ask h2 .name{ color: var(--accent); }
  .choice-row{
    position:relative;
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:26px;
    min-height:56px;
  }
  #noBtn{
    position:relative;
    transition: transform .18s ease;
  }

  /* ---------- YES STEP ---------- */
  .yes-step{ text-align:center; }
  .yes-step .heart{
    font-size:44px;
    display:inline-block;
    animation: pulse3d 1.4s ease-in-out infinite;
    filter: drop-shadow(0 10px 16px rgba(224,17,95,0.45));
  }
  @keyframes pulse3d{
    0%,100%{ transform: scale(1) rotateY(0deg) translateZ(0); }
    50%{ transform: scale(1.18) rotateY(180deg) translateZ(30px); }
  }

  /* ---------- CONFETTI (4D burst on Yes) ---------- */
  .confetti{
    position:fixed;
    top:0; left:0;
    font-size:22px;
    z-index:50;
    pointer-events:none;
    animation: confettiFall linear forwards;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
  }
  @keyframes confettiFall{
    0%{ transform: translate3d(0,0,0) rotate(0deg); opacity:1; }
    100%{ transform: translate3d(var(--cx,0px), var(--cy,600px), var(--cz,0px)) rotate(var(--cr,540deg)); opacity:0; }
  }
  .yes-step h2{ font-size:22px; margin-bottom:14px; }
  .comment-box{
    background: var(--bg);
    border:1px dashed var(--line);
    border-radius:14px;
    padding:16px;
    margin:16px 0 22px;
    font-style: italic;
    color: var(--text-soft);
  }
  .link-row{
    display:flex;
    gap:8px;
    margin-top:14px;
  }
  .link-row input{
    flex:1;
    background: var(--bg);
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    font-size:13px;
    color: var(--text);
  }
  .stack{ display:flex; flex-direction:column; gap:10px; margin-top:18px; }
  .note{ font-size:12px; color: var(--text-soft); margin-top:10px; }
  #saveBtn{ margin-bottom:16px; }
  #saveNote{ color: var(--accent); font-weight:700; text-align:center; }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<div class="heart-field" id="heartField"></div>

<div class="stage">

  <!-- GATE: 3D switch entry point -->
  <div id="gate" class="gate">
    <div class="heart-3d"><div class="face">💗</div></div>
    <div class="eyebrow">A little something for someone</div>
    <h1>Flip the switch</h1>
    <p>Turn it on to begin</p>
    <button id="themeSwitch" class="switch" aria-label="Turn on">
      <div class="switch-track">
        <div class="switch-knob">🌙</div>
      </div>
    </button>
  </div>

  <!-- FORM STEP -->
  <div id="formStep" class="card hidden">
    <div class="eyebrow" style="letter-spacing:.14em;text-transform:uppercase;font-size:12px;color:var(--text-soft);margin-bottom:4px;">Step 1</div>
    <h2 style="font-size:22px;margin-bottom:18px;">Let's set the scene</h2>
    <div class="field">
      <label for="yourName">Your name</label>
      <input id="yourName" type="text" placeholder="e.g. Arun" autocomplete="off">
    </div>
    <div class="field">
      <label for="loverName">Their name</label>
      <input id="loverName" type="text" placeholder="e.g. Meera" autocomplete="off">
    </div>
    <div class="field">
      <label for="comment">A note for them</label>
      <textarea id="comment" rows="3" placeholder="Something only they'd understand..."></textarea>
    </div>
    <button id="startBtn" class="btn btn-primary btn-block">Start</button>
  </div>

  <!-- ASK STEP -->
  <div id="askStep" class="card ask hidden">
    <div class="heart">💌</div>
    <h2 id="askText"></h2>
    <div class="choice-row">
      <button id="yesBtn" class="btn btn-primary">Yes</button>
      <button id="noBtn" class="btn btn-ghost">No</button>
    </div>
  </div>

  <!-- YES / RESULT STEP -->
  <div id="yesStep" class="card yes-step hidden">
    <div class="heart">💕</div>
    <h2 id="yesText"></h2>
    <div class="comment-box" id="commentBox"></div>

    <button id="saveBtn" class="btn btn-ghost btn-block">💾 Save</button>
    <p class="note hidden" id="saveNote"></p>

    <div id="generatorArea">
      <button id="generateBtn" class="btn btn-primary btn-block">Generate link</button>
    </div>

    <div id="linkArea" class="hidden">
      <div class="link-row">
        <input id="linkOutput" type="text" readonly>
        <button id="copyBtn" class="btn btn-ghost">Copy</button>
      </div>
      <div class="stack">
        <button id="downloadBtn" class="btn btn-ghost btn-block">Download login.txt</button>
      </div>
      <p class="note">This link only works once this page is hosted online (e.g. GitHub Pages / Netlify) — it currently encodes the data client-side.</p>
    </div>
  </div>

</div>

<script>
(function(){
  const html = document.documentElement;
  const gate = document.getElementById('gate');
  const themeSwitch = document.getElementById('themeSwitch');
  const formStep = document.getElementById('formStep');
  const askStep = document.getElementById('askStep');
  const yesStep = document.getElementById('yesStep');

  const yourNameInput = document.getElementById('yourName');
  const loverNameInput = document.getElementById('loverName');
  const commentInput = document.getElementById('comment');

  const askText = document.getElementById('askText');
  const yesText = document.getElementById('yesText');
  const commentBox = document.getElementById('commentBox');
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const generateBtn = document.getElementById('generateBtn');
  const generatorArea = document.getElementById('generatorArea');
  const linkArea = document.getElementById('linkArea');
  const linkOutput = document.getElementById('linkOutput');
  const copyBtn = document.getElementById('copyBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const saveBtn = document.getElementById('saveBtn');
  const saveNote = document.getElementById('saveNote');

  let data = { yourName:'', loverName:'', comment:'', link:'' };

  // ---------- 3D floating heart field (background) ----------
  const heartField = document.getElementById('heartField');
  const heartEmojis = ['💗','💖','💘','💝','❤️','💓'];
  function spawnHeart(){
    const el = document.createElement('div');
    el.className = 'heart-particle';
    el.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    const size = 14 + Math.random() * 26;
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = size + 'px';
    el.style.setProperty('--drift', (Math.random() * 160 - 80) + 'px');
    el.style.setProperty('--depth', (Math.random() * 200 - 100) + 'px');
    const duration = 9 + Math.random() * 10;
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = (Math.random() * 4) + 's';
    heartField.appendChild(el);
    setTimeout(() => el.remove(), (duration + 4) * 1000);
  }
  for(let i = 0; i < 16; i++) spawnHeart();
  setInterval(spawnHeart, 1400);

  // ---------- 4D parallax: pointer-driven depth on the heart field + card tilt ----------
  window.addEventListener('mousemove', (e) => {
    const px = (e.clientX / window.innerWidth) - 0.5;
    const py = (e.clientY / window.innerHeight) - 0.5;
    heartField.style.transform = `translate3d(${px * -30}px, ${py * -20}px, 0) rotateX(${py * 4}deg) rotateY(${px * -4}deg)`;

    const activeCard = document.querySelector('.card:not(.hidden)');
    if(activeCard){
      activeCard.style.setProperty('--tiltX', (px * 10) + 'deg');
      activeCard.style.setProperty('--tiltY', (py * -10) + 'deg');
    }
  });

  // ---------- confetti burst ----------
  function burstConfetti(originEl){
    const rect = originEl.getBoundingClientRect();
    const originX = rect.left + rect.width / 2;
    const originY = rect.top + rect.height / 2;
    for(let i = 0; i < 26; i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
      c.style.left = originX + 'px';
      c.style.top = originY + 'px';
      const angle = Math.random() * Math.PI * 2;
      const dist = 120 + Math.random() * 260;
      c.style.setProperty('--cx', Math.cos(angle) * dist + 'px');
      c.style.setProperty('--cy', (Math.sin(angle) * dist * 0.6) + 300 + Math.random() * 200 + 'px');
      c.style.setProperty('--cz', (Math.random() * 200 - 100) + 'px');
      c.style.setProperty('--cr', (Math.random() * 720 - 360) + 'deg');
      c.style.animationDuration = (1.4 + Math.random() * 1.2) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }
  }

  function showOnly(el){
    [formStep, askStep, yesStep].forEach(s => s.classList.add('hidden'));
    gate.classList.add('hidden');
    el.classList.remove('hidden');
  }

  function renderAsk(loverName){
    askText.innerHTML = `HI ! <span class="name">${escapeHtml(loverName)}</span> I Love you.<br>Will you accept me?`;
  }
  function renderYes(){
    yesText.textContent = 'I knew you would love me too 💕';
    commentBox.textContent = data.comment ? `"${data.comment}"` : '';
    commentBox.style.display = data.comment ? 'block' : 'none';
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ---------- entry: check for a shared link first ----------
  const params = new URLSearchParams(window.location.search);
  const sharedId = params.get('id');

  async function tryLoadShared(){
    if(!sharedId) return false;
    try{
      const result = await window.storage.get('proposal:' + sharedId, true);
      if(result && result.value){
        const payload = JSON.parse(result.value);
        data.loverName = payload.loverName || '';
        data.comment = payload.comment || '';
        html.setAttribute('data-theme', 'dark');
        renderAsk(data.loverName);
        showOnly(askStep);
        return true;
      }
    }catch(e){ /* no shared record found, fall through to normal flow */ }
    return false;
  }

  tryLoadShared();

  // ---------- theme switch / gate ----------
  themeSwitch.addEventListener('click', () => {
    const turningOn = !themeSwitch.classList.contains('on');
    themeSwitch.classList.toggle('on');
    html.setAttribute('data-theme', turningOn ? 'dark' : 'light');
    themeSwitch.querySelector('.switch-knob').textContent = turningOn ? '☀️' : '🌙';
    if(turningOn){
      showOnly(formStep);
    }
  });

  // ---------- start ----------
  document.getElementById('startBtn').addEventListener('click', () => {
    const yourName = yourNameInput.value.trim();
    const loverName = loverNameInput.value.trim();
    const comment = commentInput.value.trim();
    if(!yourName || !loverName){
      yourNameInput.style.borderColor = yourName ? '' : 'var(--accent)';
      loverNameInput.style.borderColor = loverName ? '' : 'var(--accent)';
      return;
    }
    data.yourName = yourName;
    data.loverName = loverName;
    data.comment = comment;
    renderAsk(loverName);
    showOnly(askStep);
  });

  // ---------- evasive No button ----------
  function dodge(){
    const row = noBtn.parentElement;
    const rowRect = row.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();
    const maxX = Math.max(0, rowRect.width - btnRect.width);
    const maxY = 90;
    const x = (Math.random() * maxX) - (maxX/2);
    const y = (Math.random() * maxY) - (maxY/2);
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
  }
  noBtn.addEventListener('mouseenter', dodge);
  noBtn.addEventListener('click', (e) => { e.preventDefault(); dodge(); });
  noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); dodge(); });

  // ---------- yes ----------
  yesBtn.addEventListener('click', () => {
    burstConfetti(yesBtn);
    renderYes();
    generatorArea.classList.remove('hidden');
    linkArea.classList.add('hidden');
    showOnly(yesStep);
  });

  // ---------- generate link ----------
  generateBtn.addEventListener('click', async () => {
    const id = Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
    const payload = { loverName: data.loverName, comment: data.comment };
    try{
      await window.storage.set('proposal:' + id, JSON.stringify(payload), true);
    }catch(e){ /* storage unavailable, link will still be built but won't resolve elsewhere */ }

    const base = window.location.origin + window.location.pathname;
    const link = base + '?id=' + id;
    data.link = link;

    linkOutput.value = link;
    linkArea.classList.remove('hidden');
    generatorArea.classList.add('hidden');
  });

  // ---------- shared helpers for saving to login.txt ----------
  function downloadText(filename, content){
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  async function getStoredEntries(){
    try{
      const listResult = await window.storage.get('login_entries', false);
      return listResult && listResult.value ? JSON.parse(listResult.value) : [];
    }catch(e){ return []; }
  }

  function formatEntries(entries){
    return entries.map(e =>
`your_name: ${e.yourName}
lover_name: ${e.loverName}
comment: ${e.comment}
link: ${e.link || '(not generated yet)'}
saved_at: ${e.savedAt}
---`).join('\n');
  }

  // ---------- save button: stores this entry + writes login.txt ----------
  saveBtn.addEventListener('click', async () => {
    const entry = {
      yourName: data.yourName,
      loverName: data.loverName,
      comment: data.comment,
      link: data.link || '',
      savedAt: new Date().toISOString()
    };

    let entries = await getStoredEntries();
    entries.push(entry);
    try{
      await window.storage.set('login_entries', JSON.stringify(entries), false);
    }catch(e){ /* storage unavailable — still let the download happen */ }

    downloadText('login.txt', formatEntries(entries));

    saveNote.textContent = 'Saved ✓ — added to login.txt';
    saveNote.classList.remove('hidden');
    setTimeout(() => saveNote.classList.add('hidden'), 2500);
  });

  copyBtn.addEventListener('click', () => {
    linkOutput.select();
    navigator.clipboard && navigator.clipboard.writeText(linkOutput.value);
    copyBtn.textContent = 'Copied!';
    setTimeout(() => copyBtn.textContent = 'Copy', 1500);
  });

  downloadBtn.addEventListener('click', async () => {
    const entries = await getStoredEntries();
    if(entries.length === 0){
      downloadText('login.txt',
`your_name: ${data.yourName}
lover_name: ${data.loverName}
comment: ${data.comment}
link: ${data.link}
saved_at: ${new Date().toISOString()}`);
    }else{
      downloadText('login.txt', formatEntries(entries));
    }
  });
})();
</script>

</body>
</html>
