<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>flip the switch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* dark room tokens */
    --dark-bg-1:#0b0710;
    --dark-bg-2:#160c1c;
    --wall:#1e1424;
    --wall-shadow:#0a0610;
    --ember:#ff2e63;
    --ember-dim:#5a1030;
 
    /* bright valentine tokens */
    --bright-1:#fff1f4;
    --bright-2:#ffd4e0;
    --rose:#e5006e;
    --rose-deep:#a3004f;
    --gold:#f4b942;
    --ink:#3a0d22;
 
    --display:'Playfair Display', serif;
    --body:'Poppins', sans-serif;
  }
 
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    font-family:var(--body);
    background:radial-gradient(ellipse at 50% 20%, var(--dark-bg-2), var(--dark-bg-1) 70%);
    color:#f3e9ee;
    overflow-x:hidden;
    transition:background 1.1s ease;
    position:relative;
  }
  body.lights-on{
    background:radial-gradient(ellipse at 50% 0%, var(--bright-2), var(--bright-1) 65%);
    color:var(--ink);
  }
 
  /* ---------- floating hearts ambiance ---------- */
  #heartsBg{
    position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;
  }
  .heart-particle{
    position:absolute; bottom:-10%; font-size:1.2rem; opacity:.25;
    animation:floatUp linear infinite;
    filter:blur(.2px);
  }
  body.lights-on .heart-particle{ opacity:.35; }
  @keyframes floatUp{
    0%{ transform:translateY(0) rotate(0deg); opacity:0; }
    10%{ opacity:.3; }
    100%{ transform:translateY(-120vh) rotate(40deg); opacity:0; }
  }
 
  main#app{
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:2rem 1.25rem;
    perspective:1200px;
  }
 
  .stage{
    display:none;
    flex-direction:column;
    align-items:center;
    text-align:center;
    width:100%;
    max-width:620px;
    animation:riseIn .8s ease both;
  }
  .stage.active{ display:flex; }
 
  @keyframes riseIn{
    from{ opacity:0; transform:translateY(28px) rotateX(6deg); }
    to{ opacity:1; transform:translateY(0) rotateX(0deg); }
  }
 
  /* ---------- STAGE 1: wall + switch ---------- */
  .wall-wrap{ perspective:900px; margin-bottom:1.5rem; }
  .wall{
    width:min(70vw,260px);
    height:min(70vw,260px);
    background:linear-gradient(155deg,var(--wall),var(--wall-shadow));
    border-radius:14px;
    box-shadow:
      0 30px 60px rgba(0,0,0,.55),
      inset 0 0 0 2px rgba(255,255,255,.03);
    display:flex; align-items:center; justify-content:center;
    transform:rotateY(-8deg) rotateX(4deg);
    transition:transform .6s ease;
  }
  .wall-wrap:hover .wall{ transform:rotateY(-2deg) rotateX(1deg); }
 
  .switch-plate{
    width:96px; height:150px;
    background:linear-gradient(160deg,#efe7ea,#cfc3c9);
    border-radius:10px;
    box-shadow:0 12px 22px rgba(0,0,0,.5), inset 0 0 0 3px rgba(0,0,0,.08);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transform-style:preserve-3d;
  }
  .switch-rocker{
    width:52px; height:96px;
    background:linear-gradient(180deg,#fff,#e7dde1);
    border-radius:8px;
    box-shadow:0 6px 12px rgba(0,0,0,.35), inset 0 -3px 4px rgba(0,0,0,.1);
    position:relative;
    transform-origin:center;
    transform:rotateX(22deg) translateY(-18px);
    transition:transform .35s cubic-bezier(.4,1.6,.4,1), box-shadow .35s ease;
  }
  .switch-rocker::after{
    content:"";
    position:absolute; left:50%; top:10px; width:20px; height:4px;
    background:var(--ember-dim); border-radius:2px; transform:translateX(-50%);
    transition:background .35s ease;
  }
  body.lights-on .switch-rocker{
    transform:rotateX(-22deg) translateY(18px);
    box-shadow:0 2px 6px rgba(0,0,0,.25), inset 0 3px 4px rgba(0,0,0,.12);
  }
  body.lights-on .switch-rocker::after{ background:var(--rose); }
 
  .hint{
    font-size:.85rem; letter-spacing:.12em; text-transform:uppercase;
    opacity:.55; margin-top:.5rem;
  }
 
  /* ---------- STAGE 2: form ---------- */
  .title-3d{
    font-family:var(--display);
    font-size:clamp(1.8rem,5vw,2.6rem);
    margin:0 0 1.5rem;
    text-shadow:0 1px 0 rgba(255,255,255,.5), 0 3px 0 var(--gold), 0 8px 18px rgba(163,0,79,.25);
  }
  .form-card{
    width:100%;
    background:rgba(255,255,255,.55);
    border:1px solid rgba(255,255,255,.7);
    border-radius:18px;
    padding:1.75rem;
    backdrop-filter:blur(6px);
    box-shadow:0 20px 40px rgba(163,0,79,.12);
    display:flex; flex-direction:column; gap:1rem;
  }
  .form-card label{
    text-align:left; font-size:.8rem; font-weight:500; color:var(--rose-deep);
    display:flex; flex-direction:column; gap:.35rem;
  }
  .form-card input, .form-card textarea{
    font-family:var(--body);
    font-size:1rem;
    padding:.7rem .9rem;
    border-radius:10px;
    border:1.5px solid #f1c1d4;
    background:#fff;
    color:var(--ink);
    resize:vertical;
  }
  .form-card input:focus, .form-card textarea:focus{
    outline:none; border-color:var(--rose);
  }
 
  /* ---------- buttons ---------- */
  .btn{
    font-family:var(--body); font-weight:600; font-size:1rem;
    padding:.8rem 1.8rem; border-radius:999px; border:none; cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease, opacity .2s ease;
  }
  .btn:active{ transform:scale(.96); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
  .btn-primary{
    background:linear-gradient(135deg,var(--rose),var(--rose-deep));
    color:#fff; box-shadow:0 10px 22px rgba(163,0,79,.35);
  }
  .btn-secondary{
    background:#fff; color:var(--rose-deep); border:1.5px solid var(--rose);
  }
  .btn-yes{
    background:linear-gradient(135deg,#ff5c8a,var(--rose));
    color:#fff; box-shadow:0 10px 24px rgba(229,0,110,.4);
    font-size:1.1rem; padding:.9rem 2.4rem;
  }
  .btn-no{
    background:#fff; color:#8a8a8a; border:1.5px solid #ddd;
    position:relative; z-index:5;
  }
  .btn-row{
    display:flex; gap:1.2rem; margin-top:2rem; justify-content:center;
    position:relative; min-height:70px; width:100%; flex-wrap:wrap;
  }
 
  /* ---------- STAGE 3: ask ---------- */
  .ask-3d{ transform-style:preserve-3d; }
  .line{
    font-family:var(--display);
    margin:.3rem 0;
    text-shadow:0 1px 0 rgba(255,255,255,.6), 0 4px 0 var(--gold), 0 10px 20px rgba(163,0,79,.3);
  }
  .hi{ font-size:clamp(1.6rem,5vw,2.2rem); font-weight:600; }
  .love{
    font-size:clamp(2.4rem,9vw,4rem); font-weight:900; color:var(--rose);
    text-shadow:0 1px 0 #fff, 0 5px 0 var(--gold), 0 16px 30px rgba(163,0,79,.4);
    letter-spacing:.02em;
  }
  .q{ font-size:clamp(1.3rem,4vw,1.8rem); font-weight:500; }
  .by{ font-style:italic; opacity:.75; font-size:.85em; }
 
  /* ---------- STAGE 4: reveal ---------- */
  .reveal-line{
    font-size:clamp(1.6rem,5vw,2.3rem); font-weight:700; margin-bottom:1.5rem;
  }
  .comment-card{
    font-family:var(--display); font-style:italic;
    font-size:clamp(1.1rem,3.2vw,1.4rem);
    background:rgba(255,255,255,.6);
    border:1px solid rgba(255,255,255,.8);
    border-radius:16px; padding:1.6rem 1.8rem;
    box-shadow:0 18px 34px rgba(163,0,79,.18);
    max-width:520px; margin-bottom:2rem;
    transform:rotateX(4deg);
  }
  .link-box{
    display:flex; gap:.6rem; margin-top:1.4rem; width:100%; flex-wrap:wrap; justify-content:center;
  }
  .link-box.hidden{ display:none; }
  #linkOutput{
    flex:1; min-width:200px; padding:.7rem .9rem; border-radius:10px;
    border:1.5px solid #f1c1d4; font-family:var(--body); font-size:.85rem;
  }
 
  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>
 
<div id="heartsBg"></div>
 
<main id="app">
 
  <section id="stageSwitch" class="stage active">
    <div class="wall-wrap">
      <div class="wall">
        <div class="switch-plate" id="switchPlate" role="button" tabindex="0" aria-label="Flip the light switch">
          <div class="switch-rocker" id="switchRocker"></div>
        </div>
      </div>
    </div>
    <p class="hint">flip the switch to begin</p>
  </section>
 
  <section id="stageForm" class="stage">
    <h1 class="title-3d">let's set the scene</h1>
    <div class="form-card">
      <label>Your name
        <input id="inpName1" maxlength="30" placeholder="e.g. Arjun" autocomplete="off" />
      </label>
      <label>Their name
        <input id="inpName2" maxlength="30" placeholder="e.g. Meera" autocomplete="off" />
      </label>
      <label>A little note (optional)
        <textarea id="inpComment" maxlength="200" rows="3" placeholder="Write something only they'd understand..."></textarea>
      </label>
      <button id="btnNext" class="btn btn-primary" disabled>Next</button>
    </div>
  </section>
 
  <section id="stageAsk" class="stage">
    <div class="ask-3d">
      <p class="line hi">HI <span id="askName2"></span> !</p>
      <p class="line love">I LOVE YOU</p>
      <p class="line q">Will you accept me? <span class="by">— <span id="askName1"></span></span></p>
    </div>
    <div class="btn-row" id="btnRow">
      <button id="btnYes" class="btn btn-yes">Yes</button>
      <button id="btnNo" class="btn btn-no">No</button>
    </div>
  </section>
 
  <section id="stageReveal" class="stage">
    <p class="line reveal-line">I knew you'd say yes 💗</p>
    <div class="comment-card" id="revealComment"></div>
    <button id="btnSave" class="btn btn-primary">Save &amp; get link</button>
    <div class="link-box hidden" id="linkBox">
      <input id="linkOutput" readonly />
      <button id="btnCopy" class="btn btn-secondary">Copy link</button>
    </div>
  </section>
 
</main>
 
<script>
(function(){
  const $ = id => document.getElementById(id);
  const stages = {
    switchStage: $('stageSwitch'),
    form: $('stageForm'),
    ask: $('stageAsk'),
    reveal: $('stageReveal')
  };
 
  function showStage(el){
    Object.values(stages).forEach(s => s.classList.remove('active'));
    el.classList.add('active');
  }
 
  // ---------- floating hearts ----------
  const heartsWrap = $('heartsBg');
  function spawnHeart(){
    const h = document.createElement('span');
    h.className = 'heart-particle';
    h.textContent = Math.random() > .5 ? '♥' : '❤';
    h.style.left = Math.random()*100 + 'vw';
    h.style.fontSize = (0.8 + Math.random()*1.4) + 'rem';
    const dur = 9 + Math.random()*10;
    h.style.animationDuration = dur + 's';
    heartsWrap.appendChild(h);
    setTimeout(()=>h.remove(), dur*1000);
  }
  setInterval(spawnHeart, 700);
  for(let i=0;i<6;i++) setTimeout(spawnHeart, i*300);
 
  // ---------- gentle parallax "4D" tilt on headline text ----------
  document.addEventListener('mousemove', (e)=>{
    const nx = (e.clientX/window.innerWidth - .5);
    const ny = (e.clientY/window.innerHeight - .5);
    document.querySelectorAll('.line, .title-3d, .comment-card').forEach(el=>{
      el.style.transform = `rotateX(${(-ny*8).toFixed(2)}deg) rotateY(${(nx*8).toFixed(2)}deg)`;
    });
  });
 
  // ---------- data encode/decode for shareable link ----------
  function encodeData(obj){
    return btoa(encodeURIComponent(JSON.stringify(obj)));
  }
  function decodeData(str){
    try{ return JSON.parse(decodeURIComponent(atob(str))); }
    catch(e){ return null; }
  }
 
  let data = { n1:'', n2:'', c:'' };
  let sharedView = false;
 
  const hash = location.hash;
  if(hash && hash.indexOf('#v=') === 0){
    const parsed = decodeData(hash.slice(3));
    if(parsed && parsed.n1 && parsed.n2){
      data = parsed;
      sharedView = true;
    }
  }
 
  if(sharedView){
    // shared link mode: jump straight to the ask stage, skip switch + form
    document.body.classList.add('lights-on');
    fillAskStage();
    showStage(stages.ask);
  } else {
    // ---------- STAGE 1: switch ----------
    const switchPlate = $('switchPlate');
    function flipSwitch(){
      if(document.body.classList.contains('lights-on')) return;
      document.body.classList.add('lights-on');
      switchPlate.setAttribute('aria-pressed','true');
      setTimeout(()=>{ showStage(stages.form); }, 650);
    }
    switchPlate.addEventListener('click', flipSwitch);
    switchPlate.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); flipSwitch(); }
    });
 
    // ---------- STAGE 2: form ----------
    const inpName1 = $('inpName1'), inpName2 = $('inpName2'), inpComment = $('inpComment');
    const btnNext = $('btnNext');
    function validateForm(){
      btnNext.disabled = !(inpName1.value.trim() && inpName2.value.trim());
    }
    [inpName1, inpName2].forEach(i => i.addEventListener('input', validateForm));
 
    btnNext.addEventListener('click', ()=>{
      data.n1 = inpName1.value.trim();
      data.n2 = inpName2.value.trim();
      data.c = inpComment.value.trim();
      fillAskStage();
      showStage(stages.ask);
    });
  }
 
  function fillAskStage(){
    $('askName1').textContent = data.n1 || 'someone who loves you';
    $('askName2').textContent = data.n2 || 'you';
  }
 
  // ---------- STAGE 3: ask (yes / dodging no) ----------
  const btnRow = $('btnRow');
  const btnNo = $('btnNo');
  const btnYes = $('btnYes');
 
  function dodge(){
    const rowRect = btnRow.getBoundingClientRect();
    const btnRect = btnNo.getBoundingClientRect();
    const maxX = Math.max(rowRect.width - btnRect.width, 40);
    const maxY = Math.max(140, rowRect.height - btnRect.height);
    const x = (Math.random() - 0.5) * maxX * 1.4;
    const y = (Math.random() - 0.2) * maxY;
    btnNo.style.position = 'relative';
    btnNo.style.transition = 'transform .18s ease';
    btnNo.style.transform = `translate(${x}px, ${y}px)`;
  }
  btnNo.addEventListener('mouseenter', dodge);
  btnNo.addEventListener('click', (e)=>{ e.preventDefault(); dodge(); });
  btnNo.addEventListener('touchstart', (e)=>{ e.preventDefault(); dodge(); }, {passive:false});
 
  btnYes.addEventListener('click', ()=>{
    $('revealComment').textContent = data.c && data.c.length
      ? data.c
      : 'You make every ordinary day feel like Valentine\'s Day.';
    showStage(stages.reveal);
  });
 
  // ---------- STAGE 4: reveal + save link ----------
  const btnSave = $('btnSave');
  const linkBox = $('linkBox');
  const linkOutput = $('linkOutput');
  const btnCopy = $('btnCopy');
 
  if(sharedView){
    btnSave.style.display = 'none';
  } else {
    btnSave.addEventListener('click', ()=>{
      const encoded = encodeData(data);
      const url = location.origin + location.pathname + '#v=' + encoded;
      linkOutput.value = url;
      linkBox.classList.remove('hidden');
      linkOutput.focus();
      linkOutput.select();
    });
    btnCopy.addEventListener('click', ()=>{
      linkOutput.select();
      navigator.clipboard && navigator.clipboard.writeText(linkOutput.value).catch(()=>{
        document.execCommand('copy');
      });
      btnCopy.textContent = 'Copied!';
      setTimeout(()=> btnCopy.textContent = 'Copy link', 1500);
    });
  }
})();
</script>
</body>
</html>
